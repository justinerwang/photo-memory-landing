<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Upgrade Complete - Photo Memory</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        color-scheme: light dark;
        --ink: #07352d;
        --body: #596477;
        --background: #fffaf2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100dvh;
        margin: 0;
        place-items: center;
        color: var(--body);
        background: linear-gradient(180deg, #fffaf3 0%, #fff8ee 100%);
        font-family:
          ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(640px, calc(100% - 40px));
        padding: 24px 0;
        text-align: center;
      }

      h1 {
        margin: 0 0 18px;
        color: var(--ink);
        font-size: clamp(2.15rem, 7vw, 5rem);
        line-height: 1.05;
        letter-spacing: -0.04em;
        white-space: nowrap;
      }

      p {
        margin: 0;
        font-size: 1.1rem;
        line-height: 1.6;
      }

      .next-step {
        max-width: 520px;
        margin: 26px auto 0;
        color: var(--ink);
        font-weight: 750;
      }

      .close-note {
        margin-top: 18px;
        color: var(--body);
        font-size: 0.92rem;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --ink: #f3eee8;
          --body: #d4c8bd;
          --background: #171a18;
        }

        body {
          background: linear-gradient(180deg, #171a18 0%, #1e1c19 100%);
        }

      }
    </style>
  </head>
  <body>
    <main>
      <h1>Thanks for upgrading</h1>
      <p class="next-step">
        Return to the Photo Memory app and select Refresh entitlement to activate paid access.
      </p>
      <p class="close-note">You can close this window.</p>
    </main>
    <script>
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push({
        event: "upgrade_thank_you_view",
        path: window.location.pathname,
        timestamp: new Date().toISOString()
      });
    </script>
  </body>
</html>
